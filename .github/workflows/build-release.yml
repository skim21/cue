name: Build & Release APK

on:
  push:
    branches: [main]
  workflow_dispatch:  # 수동 실행 가능

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > cue.keystore

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> local.properties
          echo "api.base.url=https://buddy.ppai-lab.com/" >> local.properties
          echo "api.key=none" >> local.properties

      - name: Run Unit Tests
        run: ./gradlew test --tests "com.ppailab.cue.*" 2>&1
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/cue.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: cue
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Build & Sign Release APK
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/cue.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: cue
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Rename APK
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | grep -oP '"[^"]+"' | tr -d '"' | head -1)
          BUILD=${{ github.run_number }}
          mv app/build/outputs/apk/release/app-release.apk cue-v${VERSION}-build${BUILD}.apk
          echo "APK_NAME=cue-v${VERSION}-build${BUILD}.apk" >> $GITHUB_ENV
          echo "RELEASE_TAG=v${VERSION}-build${BUILD}" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: "Cue ${{ env.RELEASE_TAG }}"
          body: |
            ## Cue Android 앱

            **설치 방법**
            1. 아래 APK 파일 다운로드
            2. 폰에서 파일 열기
            3. "알 수 없는 앱 허용" → 설치
            4. 앱 열고 "시작하기" 탭

            > 카카오톡에서 메시지 선택 → "Cue 답장" → AI 답장 3개 즉시 제안
          files: ${{ env.APK_NAME }}
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
